kind = "web"
previewPath = "/"
title = "Healthcare Monitoring Platform"
version = "1.0.0"
id = "artifacts/healthcare-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25821

[services.development]
run = "pnpm --filter @workspace/healthcare-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/healthcare-app", "run", "build" ]
publicDir = "artifacts/healthcare-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25821"
BASE_PATH = "/"
